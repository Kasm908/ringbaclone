services:
  - type: web
    name: scam-slayer-api
    env: python
    buildCommand: "./build.sh"
    startCommand: "daphne -p $PORT -b 0.0.0.0 core.asgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: scam-slayer-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: scam-slayer-redis
          type: redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://jumahans.github.io"
      - key: SCAM_SLAYER_API_KEY
        generateValue: true
      - key: RESPORG_BACKEND
        value: "local"

  - type: redis
    name: scam-slayer-redis
    plan: free

databases:
  - name: scam-slayer-db
    plan: free